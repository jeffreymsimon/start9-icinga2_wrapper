[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:mysql]
command=/usr/sbin/mysqld
priority=1
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/mysql.log
stderr_logfile=/var/log/supervisor/mysql-err.log

[program:icinga2]
command=/usr/sbin/icinga2 daemon -e /var/log/icinga2/error.log
user=root
priority=2
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/var/log/supervisor/icinga2.log
stderr_logfile=/var/log/supervisor/icinga2-err.log

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
priority=3
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/apache2.log
stderr_logfile=/var/log/supervisor/apache2-err.log

[program:cron]
command=/usr/sbin/cron -f
priority=4
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/cron.log
stderr_logfile=/var/log/supervisor/cron-err.log
